name: Java CI with Maven

on:
  push:
    branches: [ "feature/cicd" ]
  pull_request:
    branches: [ "feature/cicd" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
       distribution: 'temurin'
       java-version: '21'
       cache: 'maven'
    - name: Build
      run: mvn -B clean verify
    - name: Package only launcher module
      run: mvn -pl launcher -am package
    - name: Run application
      run: java -jar launcher/target/*.jar
    - name: Upload artifact (jar)
      uses: actions/upload-artifact@v4
      with:
       name: app-jar
       path: launcher/target/*.jar
