name: Java CI with Maven

on:
  push:
    branches: [ "feature/cicd" ]
  pull_request:
    branches: [ "feature/cicd" ]

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: algorithms

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
       distribution: 'temurin'
       java-version: '21'
       cache: 'maven'
       cache-dependency-path: algorithms/**/pom.xml
    - name: Build
      run: mvn -B clean verify
    - name: Upload artifact (jar)
      uses: actions/upload-artifact@v4
      with:
       name: app-jar
       path: algorithms/launcher/target/*.jar
